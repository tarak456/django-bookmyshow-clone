services:
  - type: web
    name: bookmyseat
    env: python
    runtime: python
    pythonVersion: "3.11.8"
    buildCommand: "./build.sh"
    startCommand: "gunicorn bookmyseat.wsgi --log-file -"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: bookmyseat-db
          property: connectionString

databases:
  - name: bookmyseat-db
    databaseName: bookmyseat
    user: bookmyseat
