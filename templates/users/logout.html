{% extends "users/basic.html" %}
{% block title %}Logged Out — BookMySeat{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;background:var(--bg-light);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 text-center">
        <div style="background:#fff;border-radius:16px;padding:48px 36px;box-shadow:0 4px 24px rgba(0,0,0,.08);">
          <div style="width:80px;height:80px;background:#fff0f0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <i class="fas fa-sign-out-alt" style="font-size:2rem;color:var(--bms-red);"></i>
          </div>
          <h4 style="font-family:'Poppins',sans-serif;font-weight:700;color:#1a1a2e;margin-bottom:8px;">You've been logged out</h4>
          <p style="color:#888;font-size:.9rem;margin-bottom:28px;">Thanks for visiting BookMySeat. See you at the movies!</p>
          <div class="d-flex flex-column gap-2">
            <a href="{% url 'login' %}" class="btn btn-bms" style="border-radius:8px;height:44px;line-height:44px;padding:0;">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In Again
            </a>
            <a href="/" class="btn btn-outline-secondary" style="border-radius:8px;height:44px;line-height:44px;padding:0;">
              <i class="fas fa-home me-2"></i>Go to Home
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
